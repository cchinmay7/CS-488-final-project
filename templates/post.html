<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/static/styles.css" />
        <title>Post</title>
    </head>
    <body onload="initPostPage('{{ entry_id }}');">
        <div class="page">
            <div class="topbar">
                <h1>Post</h1>
                <div class="navline">
                    <a href="/feed.html">Feed</a> |
                    <a href="/u/{{ session['username'] }}">My Profile</a> |
                    <a href="/logout" onclick="doLogout(); return false;">Logout</a>
                </div>
            </div>

            <div id="divPost"></div>

            <h3 class="sectionTitle">Replies</h3>
            <div class="panel">
                <input type="hidden" id="entryID" value="{{ entry_id }}" />
                <textarea id="txtReply" rows="3" cols="60" placeholder="Write your reply"></textarea><br/>
                <button onclick="createReply();">Reply</button>
            </div>

            <div id="divReplies"></div>
        </div>

        <script src="/static/script.js"></script>
    </body>
</html>
